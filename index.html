<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Power Rangers Fan Club</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

header{
padding:18px;
text-align:center;
background:linear-gradient(90deg,red,black,blue);
font-weight:bold;
font-size:22px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#111;
position:sticky;
top:0;
}

nav button{
margin:6px;
padding:10px 14px;
border:0;
background:#222;
color:#fff;
border-radius:10px;
cursor:pointer;
}

nav button:hover{background:red;transform:scale(1.05)}

section{display:none;padding:15px}
.active{display:block}

.card{
background:#111;
padding:12px;
margin-top:10px;
border-radius:12px;
}

input,textarea,select{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:0;
}

button.action{
margin-top:8px;
padding:10px;
background:red;
color:#fff;
border:0;
border-radius:10px;
cursor:pointer;
}

.comment{background:#222;padding:8px;margin-top:5px;border-radius:8px}

/* QUIZ */
.quiz-box{
background:#111;
padding:15px;
border-radius:12px;
max-width:800px;
margin:auto;
}

.answer{
display:block;
width:100%;
margin:8px 0;
padding:10px;
background:#222;
color:#fff;
border:0;
border-radius:10px;
cursor:pointer;
}
.answer:hover{background:#444}

.progress{
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,red,blue);
}

.star-card{
background:#111;
padding:10px;
margin-top:10px;
border-left:3px solid red;
border-radius:10px;
}
</style>

</head>

<body>

<header>⚡ POWER RANGERS FAN CLUB ⚡</header>

<nav>
<button onclick="show('home')">Accueil</button>
<button onclick="show('comments')">Commentaires</button>
<button onclick="show('fans')">Fan Map</button>
<button onclick="show('saison')">Saisons</button>
<button onclick="show('stars')">Stars</button>
<button onclick="show('quiz')">Quiz ⚡</button>
</nav>

<!-- HOME -->

<section id="home" class="active">
<div class="card">
<h2>Bienvenue ⚡</h2>
<p>Site fan Power Rangers : saisons, stars, fans, commentaires et quiz.</p>
</div>
</section>

<!-- COMMENTS -->

<section id="comments">
<div class="card">
<h3>💬 Commentaires</h3>
<input id="c_name" placeholder="Pseudo">
<textarea id="c_msg" placeholder="Message"></textarea>
<button class="action" onclick="addComment()">Envoyer</button>
</div>
<div id="comment_list"></div>
</section>

<!-- FANS -->

<section id="fans">
<div class="card">
<h3>🌍 Fan Map</h3>
<input id="f_name" placeholder="Pseudo">
<input id="f_country" placeholder="Pays">
<input id="f_city" placeholder="Ville">
<button class="action" onclick="addFan()">Ajouter</button>
</div>
<div id="fan_list"></div>
</section>

<!-- SAISONS -->

<section id="saison">
<div class="card">
<h2>⚡ Saisons Power Rangers</h2>
<p>Ajoute ici tes liens YouTube</p>
</div>
</section>

<!-- STARS -->

<section id="stars">
<div class="card">
<h2>⭐ Stars Power Rangers</h2>
<div class="star-card">Jason David Frank</div>
<div class="star-card">Austin St. John</div>
<div class="star-card">Amy Jo Johnson</div>
</div>
</section>

<!-- QUIZ -->

<section id="quiz">
<div class="quiz-box">
<h2>⚡ Quiz Power Rangers</h2>

<select id="qcount">
<option value="10">10 questions</option>
<option value="20">20 questions</option>
<option value="30">30 questions</option>
</select>

<button class="action" onclick="startQuiz()">Commencer</button>

<div id="quiz_area" style="display:none">
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<h3 id="q"></h3>
<div id="a"></div>
</div>

<h3 id="result"></h3>
</div>
</section>

<script>
window.show=(id)=>{
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

/* QUIZ */
let questions=[
{q:"Qui est le Ranger Vert ?",a:["Tommy","Jason","Billy"],c:0},
{q:"Première saison ?",a:["Zeo","Mighty Morphin","RPM"],c:1},
{q:"Ranger Rouge Time Force ?",a:["Wes","Cole","Leo"],c:0}
];

let i=0,score=0,quiz=[];

window.startQuiz=()=>{
let n=parseInt(qcount.value);
quiz=questions.slice(0,n);
i=0;score=0;
quiz_area.style.display="block";
showQ();
};

function showQ(){
if(i>=quiz.length){
result.innerText=`Score ${score}/${quiz.length}`;
return;
}
let q=quiz[i];
document.getElementById('q').innerText=q.q;
let a=document.getElementById('a');
a.innerHTML="";
q.a.forEach((x,idx)=>{
a.innerHTML+=`<button class='answer' onclick='ans(${idx})'>${x}</button>`;
});
document.getElementById('bar').style.width=(i/quiz.length*100)+"%";
}

window.ans=(idx)=>{
if(idx===quiz[i].c)score++;
i++;showQ();
};
</script>

</body>
</html>
