<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Power Rangers Fan Club</title>

<style>
body {margin:0;font-family:Arial;background:#000;color:#fff}
header{padding:15px;background:red;text-align:center;font-weight:bold}
nav{display:flex;flex-wrap:wrap;background:#111;justify-content:center}
nav button{margin:5px;padding:10px;border:0;background:#222;color:#fff;cursor:pointer}
section{display:none;padding:15px}
.active{display:block}
.card{background:#111;padding:10px;margin-top:10px}
.comment{background:#222;padding:8px;margin-top:5px}
input,textarea{width:100%;margin-top:5px;padding:8px}
button{margin-top:5px;padding:8px;background:red;color:#fff;border:0}
</style>
</head>

<body>

<header>⚡ POWER RANGERS FAN CLUB ⚡</header>

<nav>
<button onclick="show('home')">Accueil</button>
<button onclick="show('comments')">Commentaires</button>
<button onclick="show('fans')">Fan Map</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="card">
<h2>Bienvenue ⚡</h2>
<p>Site fan Power Rangers simple et fonctionnel 😄</p>
</div>
</section>

<!-- COMMENTS -->
<section id="comments">
<div class="card">
<h3>💬 Commentaires</h3>
<input id="c_name" placeholder="Pseudo">
<textarea id="c_msg" placeholder="Message"></textarea>
<button onclick="addComment()">Envoyer</button>
</div>

<div id="comment_list"></div>
</section>

<!-- FANS -->
<section id="fans">
<div class="card">
<h3>🌍 Fan Map (liste)</h3>
<input id="f_name" placeholder="Pseudo">
<input id="f_country" placeholder="Pays">
<input id="f_city" placeholder="Ville (optionnel)">
<button onclick="addFan()">Ajouter</button>
<h4>Cliquer sur les adresse pour ouvrir sur google map.</h4>
</div>

<div id="fan_list"></div>
</section>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://mbbkmqkcqritrjksuojm.supabase.co",
"sb_publishable_uh0wO1pBzcY0aiB_pm8CdQ_6lRatOaB"
);

/* NAV */
window.show = (id)=>{
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* 💬 COMMENTS */
window.addComment = async ()=>{
  const n = document.getElementById("c_name");
  const m = document.getElementById("c_msg");

  if(!n.value || !m.value) return;

  await supabase.from("comments").insert([
    { name:n.value, message:m.value }
  ]);

  n.value = "";
  m.value = "";

  loadComments();
}

async function loadComments(){
  const { data } = await supabase.from("comments").select("*").order("id",{ascending:false});

  const box = document.getElementById("comment_list");
  box.innerHTML = "";

  data.forEach(c=>{
    const d = document.createElement("div");
    d.className="comment";
    d.innerHTML = "<b>"+c.name+"</b><br>"+c.message;
    box.appendChild(d);
  });
}

/* 🌍 FANS */
window.addFan = async ()=>{
  const n = document.getElementById("f_name");
  const c = document.getElementById("f_country");
  const ci = document.getElementById("f_city");

  if(!n.value || !c.value) return;

  await supabase.from("fans").insert([
    { name:n.value, country:c.value, city:ci.value }
  ]);

  n.value="";
  c.value="";
  ci.value="";

  loadFans();
}

async function loadFans(){
  const { data } = await supabase.from("fans").select("*").order("country");

  const box = document.getElementById("fan_list");
  box.innerHTML = "";

  let last="";

  data.forEach(f=>{
    if(f.country!==last){
      last=f.country;
      const h=document.createElement("h3");
      h.innerText="🌍 "+last;
      box.appendChild(h);
    }

    const d=document.createElement("div");
    d.className="comment";
    d.innerHTML="<b>"+f.name+"</b><br>"+(f.city?f.city+", ":"")+f.country;

    d.onclick=()=>{
      const q=encodeURIComponent((f.city?f.city+" ":"")+f.country);
      window.open("https://www.google.com/maps/search/?api=1&query="+q,"_blank");
    };

    box.appendChild(d);
  });
}

loadComments();
loadFans();
</script>

</body>
</html>
